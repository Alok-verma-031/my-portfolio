<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
    <div class="row">

        <div class="col-sm-12">
            <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
                <li class="nav-item " role="presentation ">
                    <button class="nav-link  bg-nav-tab sm-fs text-golden-brown" id="pills-home-tab"
                        data-bs-toggle="pill" data-bs-target="#pills-home" role="tab" aria-controls="pills-home"
                        aria-selected="false">website</button>
                </li>
                <li class="nav-item" role="presentation ">
                    <button class="nav-link bg-nav-tab sm-fs text-golden-brown" id="pills-profile-tab"
                        data-bs-toggle="pill" data-bs-target="#pills-profile" role="tab" aria-controls="pills-profile"
                        aria-selected="false">E-comerce</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link bg-nav-tab sm-fs text-golden-brown" id="pills-contact-tab"
                        data-bs-toggle="pill" data-bs-target="#pills-contact" role="tab" aria-controls="pills-contact"
                        aria-selected="false">Other</button>
                </li>
            </ul>
            <hr>
            <br>
            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="pills-home" role="tabpanel" aria-labelledby="pills-home-tab"
                    tabindex="0">
                    <div class="form-floating mb-3">
                        <input type="number" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">mobile number</label>
                    </div>
                </div>
                <div class="tab-pane fade" id="pills-profile" role="tabpanel" aria-labelledby="pills-profile-tab"
                    tabindex="0">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address</label>
                    </div>
                </div>
                <div class="tab-pane fade" id="pills-contact" role="tabpanel" aria-labelledby="pills-contact-tab"
                    tabindex="0">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Enter membership number </label>
                    </div>
                </div>
            </div>
            <br>

        </div>
    </div>
    <script src="js/bootstrap.bundle.js"></script>
</body>

</html>
